services:
  postgres:
    image: postgres:16-alpine
    container_name: fusion-postgres
    environment:
      POSTGRES_USER: fusion
      POSTGRES_PASSWORD: fusion
      POSTGRES_DB: fusion
    ports:
      - "55432:5432"
    volumes:
      - fusion-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fusion -d fusion"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  fusion-postgres-data:
